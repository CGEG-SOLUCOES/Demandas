function log(msg, tipo='info') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${tipo}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function iniciarImportacao() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Importando...';
  log('Iniciando importação de ' + dados.length + ' registros...', 'info');

  let ok = 0, erro = 0;

  for (let i = 0; i < dados.length; i++) {
    const d = dados[i];
    try {
      const doc = {
        titulo:            d.titulo || '',
        descricao:         d.descricao || '',
        atividade:         d.atividade || '',
        area:              d.area || '',
        tipo:              d.tipo || '',
        prioridade:        d.prioridade || '',
        status:            d.status || '',
        responsavel:       d.responsavel || '',
        apoio:             d.apoio || '',
        entregavel:        d.entregavel || '',
        observacoes:       d.observacoes || '',
        porcentoConcluido: d.porcentoConcluido || 0,
        avaliacao:         d.avaliacao || 0,
        criadoPor:         'importacao-excel',
        atualizadoEm:      firebase.firestore.FieldValue.serverTimestamp(),
        criadoEm:          d.criadoEmISO ? firebase.firestore.Timestamp.fromDate(new Date(d.criadoEmISO)) : firebase.firestore.FieldValue.serverTimestamp(),
        prazo:             d.prazoISO ? firebase.firestore.Timestamp.fromDate(new Date(d.prazoISO)) : null,
        dataConclusaoReal: d.dataConclusaoRealISO ? firebase.firestore.Timestamp.fromDate(new Date(d.dataConclusaoRealISO)) : null,
      };

      await db.collection('demandas').add(doc);
      ok++;

      const pct = Math.round((i+1)/dados.length*100);
      document.getElementById('prog').style.width = pct + '%';

      if ((i+1) % 20 === 0) log(`✓ ${i+1}/${dados.length} importados...`, 'ok');

    } catch(e) {
      erro++;
      log(`✕ Erro no registro ${i+1}: ${e.message}`, 'err');
    }

    // Pequena pausa para não sobrecarregar
    if (i % 10 === 0) await new Promise(r => setTimeout(r, 100));
  }

  log(`\n✅ Importação concluída! ${ok} registros importados, ${erro} erros.`, 'ok');
  btn.textContent = 'Concluído!';
  btn.style.background = '#3ecf8e';
}
